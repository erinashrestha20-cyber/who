<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        td{
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <table height="200px" width="400px" color="black" border="2" cellspacing="10px" cellpadding="20px">
        <tr>
            <th colspan="2">Student Data</th>
        </tr>
        <tr>
            <td>Column A</td>
            <td>Column B</td>
        </tr>
        <td rowspan="2"> Merged Cell</td>
        <td>Data 2</td>
        </tr>
        <tr>
            <td rowspan="2"> Data 4</td>
         
        </tr>
    </table>
</body>
</html>
<!---rolspan= merge row
colspan= merge column
used in <td>-->
