<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>100 Healing Prompts After Breakup | Bloom Within</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin:0; overflow:hidden; font-family:'Inter', sans-serif; }
    #root { width:100vw; height:100vh; }

    .stage {
      position:relative;
      width:100%;
      height:100%;
      color:#fff;
      /* Soft, feminine dark rose background */
      background: radial-gradient(circle at center, #3d1222 0%, #260a14 60%, #1a050b 100%);
    }

    .center {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      text-align:center;
      width:85%;
      max-width:600px;
    }

    .headline {
      font-size:42px;
      font-weight:800;
      letter-spacing:-1px;
      color:#ffeef2; 
      margin-bottom:10px;
    }

    .sub {
      font-size:24px;
      line-height:1.5;
      opacity:0.9;
      color:#ffb7c5;
      min-height: 80px; /* Prevents jumping */
    }

    .brand {
      position:absolute;
      top:40px;
      width:100%;
      text-align:center;
      font-size:18px;
      letter-spacing:0.3em;
      opacity:0.8;
      color:#e8a0a0;
    }

    .price-tag {
      font-size:18px;
      color:#ffc8d2;
      margin-bottom:20px;
      opacity:0.9;
    }

    .cta {
      font-size:24px;
      margin-top:10px;
      color:#fff;
      background:linear-gradient(90deg, #ff7eb3, #ff4081);
      padding:12px 30px;
      border-radius:999px;
      display:inline-block;
      text-decoration:none;
      box-shadow:0 10px 30px rgba(255, 64, 129, 0.4);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta:hover {
      transform: scale(1.05);
      box-shadow:0 15px 40px rgba(255, 64, 129, 0.5);
    }

    .next-btn {
      background: transparent;
      border: 1px solid #ffb6c1;
      color: #ffb6c1;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 20px;
      transition: all 0.2s;
    }

    .next-btn:hover {
      background: rgba(255, 182, 193, 0.1);
      border-color: #fff;
      color: #fff;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// --- THE PRODUCT STRATEGY ---
// 1. We show a sample of the product to prove its value.
// 2. We make the user interact (click) to see more.
// 3. We offer the full solution at the end.

const SAMPLE_PROMPTS = [
  "Write a letter to your past self about the strength you didn't know you had.",
  "List 3 things you can do today that your ex would never have supported.",
  "Describe your ideal day, one year from now, without them in it.",
  "What is one boundary you need to set for your healing?",
  "Write down one thing you are grateful for about this breakup.",
  "If your future self could hug you right now, what would they say?",
  "What is a hobby you abandoned that you can restart today?",
  "Visualize a room filled with love—what color are the walls?"
];

function App() {
  const [currentPromptIndex, setCurrentPromptIndex] = useState(0);
  const [typedPrompt, setTypedPrompt] = useState("");
  const [isTyping, setIsTyping] = useState(false);

  // Typing effect logic
  useEffect(() => {
    setTypedPrompt("");
    const text = SAMPLE_PROMPTS[currentPromptIndex];
    let i = 0;
    setIsTyping(true);
    
    const timer = setInterval(() => {
      if (i < text.length) {
        setTypedPrompt(text.slice(0, i + 1));
        i++;
      } else {
        setIsTyping(false);
        clearInterval(timer);
      }
    }, 40); // Typing speed

    return () => clearInterval(timer);
  }, [currentPromptIndex]);

  const nextPrompt = () => {
    if (!isTyping) {
      setCurrentPromptIndex((prev) => (prev + 1) % SAMPLE_PROMPTS.length);
    }
  };

  return (
    <div className="stage">
      <div className="brand">BLOOM WITHIN</div>

      <div className="center">
        {/* Headline: Clear Product Name */}
        <div className="headline">
          100 Healing Prompts After Breakup
        </div>

        {/* Interactive Sample Area */}
        <div className="sub" onClick={nextPrompt}>
          "{typedPrompt}"{isTyping ? "|" : ""}
        </div>

        {/* Interaction Hint */}
        <div style={{ fontSize: '12px', opacity: 0.5, marginTop: '10px' }}>
          (Click text to see next prompt)
        </div>

        {/* Price & CTA Section */}
        <div style={{ marginTop: 40 }}>
          <div className="price-tag">
            Only $19.99 • Instant Digital Download
          </div>
          
          {/* 
             IMPORTANT: Replace 'YOUR_CHECKOUT_LINK' with your actual Gumroad/Etsy link 
             Example: href="https://gumroad.com/l/yourproduct"
          */}
          <a href="https://whop.com/joined/heal-rewrite/products/100-healing-prompts-after-breakup/" className="cta">
            Get All 100 Prompts →
          </a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
