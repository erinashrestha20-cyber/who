<!doctype html>
<html>
  <head>
    <title>Tweet Box — Character Counter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="tweet-container">
      <h2>Compose Tweet</h2>

      <textarea id="tweet-input" placeholder="What's happening?"></textarea>

      <div class="bottom-row">
        <span id="char-counter">0 / 140</span>
        <button id="post-btn" disabled>Post</button>
        <button id="clear-btn" disabled>Clear</button>
      </div>

      <p id="draft-msg"></p>
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
