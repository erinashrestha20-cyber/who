<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Clock</title>
  <meta name="description" content="Customizable Digital Clock Template with animations and themed backgrounds." />
  <link rel="stylesheet" href="themes/glassMorphism.css" />
  <link rel="icon" href="assets/favicon.svg" />
  <style>
    .sr-only {

      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }
  </style>
</head>
<body>
  <div id="clock-root">
    <div id="greeting">Welcome!</div>
    <div id="time-display" aria-live="polite" aria-atomic="true">12:00:00</div>
    <div id="period-label">AM</div>
    <div id="offset-badge">Manual time active</div>

    <div id="time-input-row" style="display:none">
      <div class="input-group">
        <label for="inp-h" class="sr-only">Hours</label>
        <input class="time-part" id="inp-h" type="number" min="1" max="12" placeholder="hh" />
        <span class="time-sep">:</span>
        <label for="inp-m" class="sr-only">Minutes</label>
        <input class="time-part" id="inp-m" type="number" min="0" max="59" placeholder="mm" />
        <span class="time-sep">:</span>
        <label for="inp-s" class="sr-only">Seconds</label>
        <input class="time-part" id="inp-s" type="number" min="0" max="59" placeholder="ss" />
        <button id="ampm-toggle" type="button">AM</button>
      </div>
      <div class="action-row">
        <button class="confirm-btn" id="confirm-btn" type="button">Set time</button>
        <button class="confirm-btn" id="cancel-btn" type="button">Cancel</button>
      </div>
    </div>

    <div id="btn-row">
      <button class="clock-btn" id="correct-btn" type="button">Set correct time</button>
      <button class="clock-btn" id="reset-btn" type="button">Reset to system time</button>
    </div>
  </div>

  <script src="Js/config.js"></script>
  <script src="Js/DC.js" defer></script>
</body>
</html>
