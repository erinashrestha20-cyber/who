<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clock – Erina & Pratikshya</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1b2d;
    }

    #clock-root {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 2rem;
      transition: background 1.5s ease;
    }

    #greeting {
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.95);
      text-align: center;
    }

    #time-display {
      font-size: 88px;
      font-weight: 500;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: -3px;
      line-height: 1;
    }

    #period-label {
      font-size: 24px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      margin-top: -6px;
    }

    #offset-badge {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.3);
      padding: 4px 12px;
      border-radius: 999px;
      display: none;
      margin-top: 4px;
    }

    #time-input-row {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.35);
      border-radius: 12px;
      padding: 16px 22px;
      margin-top: 8px;
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .time-part {
      width: 60px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      font-size: 22px;
      font-weight: 500;
      text-align: center;
      padding: 6px 4px;
      border-radius: 8px;
      -moz-appearance: textfield;
    }
    .time-part::-webkit-inner-spin-button,
    .time-part::-webkit-outer-spin-button { -webkit-appearance: none; }
    .time-part:focus { outline: none; border-color: rgba(255,255,255,0.8); }

    .time-sep {
      color: rgba(255,255,255,0.6);
      font-size: 22px;
      font-weight: 500;
    }

    #ampm-toggle {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      font-size: 18px;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      min-width: 66px;
      transition: background 0.2s;
    }
    #ampm-toggle:hover { background: rgba(255,255,255,0.3); }

    .action-row { display: flex; gap: 10px; }

    .clock-btn, .confirm-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      padding: 9px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .clock-btn:hover, .confirm-btn:hover { background: rgba(255,255,255,0.3); }

    #btn-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    @media (max-width: 480px) {
      #time-display { font-size: 60px; }
      #greeting { font-size: 18px; }
    }
  </style>
</head>
<body>

<div id="clock-root">
  <div id="greeting">Good morning, Erina &amp; Pratikshya!</div>
  <div id="time-display">12:00:00</div>
  <div id="period-label">AM</div>
  <div id="offset-badge">Manual time active</div>

  <div id="time-input-row">
    <div class="input-group">
      <input class="time-part" id="inp-h" type="number" min="1" max="12" placeholder="hh" />
      <span class="time-sep">:</span>
      <input class="time-part" id="inp-m" type="number" min="0" max="59" placeholder="mm" />
      <span class="time-sep">:</span>
      <input class="time-part" id="inp-s" type="number" min="0" max="59" placeholder="ss" />
      <button id="ampm-toggle">AM</button>
    </div>
    <div class="action-row">
      <button class="confirm-btn" id="confirm-btn">Set time</button>
      <button class="confirm-btn" id="cancel-btn">Cancel</button>
    </div>
  </div>

  <div id="btn-row">
    <button class="clock-btn" id="correct-btn">Set correct time</button>
    <button class="clock-btn" id="reset-btn" style="display:none;">Reset to system time</button>
  </div>
</div>

<script>
  (function () {
    let offsetMs = 0;

    const THEMES = {
      morning: {
        bg: 'linear-gradient(160deg, #1a6b9a 0%, #f0a500 100%)',
        greeting: 'Good morning, Erina & Pratikshya!'
      },
      afternoon: {
        bg: 'linear-gradient(160deg, #3a7bd5 0%, #9775fa 100%)',
        greeting: 'Good afternoon, Erina & Pratikshya!'
      },
      evening: {
        bg: 'linear-gradient(160deg, #c0392b 0%, #2c3e50 100%)',
        greeting: 'Good evening, Erina & Pratikshya!'
      },
      night: {
        bg: 'linear-gradient(160deg, #0f1b2d 0%, #1a2a4a 100%)',
        greeting: 'Good night, Erina & Pratikshya!'
      }
    };

    function getThemeKey(h) {
      if (h >= 5 && h < 12) return 'morning';
      if (h >= 12 && h < 17) return 'afternoon';
      if (h >= 17 && h < 20) return 'evening';
      return 'night';
    }

    let lastThemeKey = null;

    function tick() {
      const now = new Date(Date.now() + offsetMs);
      const h24 = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();

      const isPM = h24 >= 12;
      const h12 = h24 % 12 || 12;

      document.getElementById('time-display').textContent =
        String(h12).padStart(2, '0') + ':' +
        String(m).padStart(2, '0') + ':' +
        String(s).padStart(2, '0');

      document.getElementById('period-label').textContent = isPM ? 'PM' : 'AM';

      const key = getThemeKey(h24);
      if (key !== lastThemeKey) {
        lastThemeKey = key;
        document.getElementById('clock-root').style.background = THEMES[key].bg;
        document.getElementById('greeting').textContent = THEMES[key].greeting;
      }
    }

    function scheduleTick() {
      tick();
      setTimeout(scheduleTick, 1000 - (Date.now() % 1000));
    }
    scheduleTick();

    const toggle = document.getElementById('ampm-toggle');
    toggle.addEventListener('click', function () {
      toggle.textContent = toggle.textContent === 'AM' ? 'PM' : 'AM';
    });

    document.getElementById('correct-btn').addEventListener('click', function () {
      const now = new Date(Date.now() + offsetMs);
      const h24 = now.getHours();
      const h12 = h24 % 12 || 12;
      document.getElementById('inp-h').value = h12;
      document.getElementById('inp-m').value = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('inp-s').value = String(now.getSeconds()).padStart(2, '0');
      toggle.textContent = h24 >= 12 ? 'PM' : 'AM';
      document.getElementById('time-input-row').style.display = 'flex';
    });

    document.getElementById('confirm-btn').addEventListener('click', function () {
      let h = parseInt(document.getElementById('inp-h').value, 10);
      const m = parseInt(document.getElementById('inp-m').value, 10);
      const s = parseInt(document.getElementById('inp-s').value, 10);
      const isPM = toggle.textContent === 'PM';

      if (isNaN(h) || isNaN(m) || isNaN(s) || h < 1 || h > 12 || m > 59 || s > 59) {
        alert('Please enter a valid time (h: 1–12, m/s: 0–59).');
        return;
      }

      if (isPM && h !== 12) h += 12;
      if (!isPM && h === 12) h = 0;

      const target = new Date();
      target.setHours(h, m, s, 0);
      offsetMs = target.getTime() - Date.now();

      document.getElementById('time-input-row').style.display = 'none';
      document.getElementById('offset-badge').style.display = 'inline-block';
      document.getElementById('reset-btn').style.display = 'inline-block';
      lastThemeKey = null;
      tick();
    });

    document.getElementById('cancel-btn').addEventListener('click', function () {
      document.getElementById('time-input-row').style.display = 'none';
    });

    document.getElementById('reset-btn').addEventListener('click', function () {
      offsetMs = 0;
      document.getElementById('offset-badge').style.display = 'none';
      document.getElementById('reset-btn').style.display = 'none';
      lastThemeKey = null;
      tick();
    });
  })();
</script>

</body>
</html>
