<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: monospace;
      font-size: 100px;
      transition: background 1s ease;
      margin: 0;
    }
    #message {
      font-size: 40px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #fff;
    }

    #clock {
      font-size: 80px;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    }

    @keyframes sparkle {
      0% { text-shadow: 0 0 5px #fff, 0 0 10px #fff; opacity: 0; }
      50% { text-shadow: 0 0 20px #fbfbfa, 0 0 30px #fbfaf7; opacity: 1; }
      100% { text-shadow: 0 0 5px #fff, 0 0 10px #fff; opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="message"></div>
  <div id="clock"></div>

  <script>
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');

      let greeting, bgColor;
      
      if (hours >= 5 && hours < 12) {
        greeting = "Good Morning, Erina!";
        bgColor = "linear-gradient(to bottom, #FFD89B, #19547B)"; // sunrise colors
      } else if (hours >= 12 && hours < 17) {
        greeting = "Good Afternoon, Erina!";
        bgColor = "linear-gradient(to bottom, #667eea, #764ba2)"; // day colors
      } else if (hours >= 17 && hours < 20) {
        greeting = "Good Evening, Erina!";
        bgColor = "linear-gradient(to bottom, #FF6B6B, #2C3E50)"; // sunset colors
      } else {
        greeting = "Good Night, Erina!";
        bgColor = "linear-gradient(to bottom, #0F2027, #203A43, #2C5364)"; // night colors
      }

      // Update message with animation
      const message = document.getElementById('message');
      message.textContent = greeting;
      message.style.animation = 'none';
      message.offsetHeight; // trigger reflow
      message.style.animation = 'sparkle 2s ease-in-out';

      // Convert to 12-hour format with AM/PM
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12; // 0 becomes 12
      hours = String(hours).padStart(2, '0'); // Add padding

      // Update clock
      document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds} ${ampm}`;
      
      // Update background
      document.body.style.background = bgColor;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
