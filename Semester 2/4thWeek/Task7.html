<!DOCTYPE html>
<html>

<head>
    <title>Inline + ID + Internal CSS</title>

    <style>
        body {
            background-color: lightgray;
        }

        #para1 {
            color: purple;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color: blue; text-align: center;">
        Welcome to My Website
    </h1>

    <!-- Paragraph using ID selector -->
    <p id="para1">
        This paragraph uses ID selector styling.
    </p>

</body>

</html>
