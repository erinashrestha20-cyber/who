<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
        display: flex;
        gap: 20px;
    }

    .Box{
        margin: 20px;
        height: 100px;
        width: 100px;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;



    }

    .Box1{
        background-color: lightcoral;
        border: black solid;
    }
    .Box1:hover{
        transform: rotateX(45deg);
        
    }
    .Box2{
        background-color: aliceblue;
        border: black solid;
    }
    .Box2:hover{
        transform: rotateY(45deg);
    }
    </style>
</head>
<body>
    <h1> Rotate</h1>
    <div class="container">
        <div class="Box Box1">Box1</div>
        <div class="Box Box2">Box2</div>
    </div>

</body>
</html>
